services:
  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8080:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: atlas-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker1:9092
    networks:
      - atlas-network
