apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-fastapi
  namespace: atlas
  labels:
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: atlas-fastapi
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-fastapi
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        app.kubernetes.io/name: atlas-fastapi
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z atlas-kafka.atlas.svc.cluster.local 9092; do
                echo "waiting for Kafka before starting ingestion..."
                sleep 5
              done
      containers:
        - name: ingestion
          image: atlas-ingestion:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/v2/entrypoint.sh"]
          envFrom:
            - configMapRef:
                name: atlas-ingestion-config
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: api
              containerPort: 8001
              protocol: TCP
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "2000m"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
