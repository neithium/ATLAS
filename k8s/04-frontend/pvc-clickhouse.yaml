apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlas-clickhouse-data
  namespace: atlas
  labels:
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: atlas-streamlit
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
