apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-processor
  namespace: atlas
  labels:
    app.kubernetes.io/component: processing
    app.kubernetes.io/name: atlas-processor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-processor
  template:
    metadata:
      labels:
        app.kubernetes.io/component: processing
        app.kubernetes.io/name: atlas-processor
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z atlas-kafka.atlas.svc.cluster.local 9092; do
                echo "waiting for Kafka..."
                sleep 5
              done
              echo "Kafka is reachable"
        - name: wait-for-topics
          image: soldevelo/kafka:4.0
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              for i in $(seq 1 30); do
                if kafka-topics.sh --bootstrap-server atlas-kafka.atlas.svc.cluster.local:9092 --list | grep -q raw-server-metrics; then
                  echo "Topic raw-server-metrics exists"
                  exit 0
                fi
                echo "waiting for topic initialization (attempt ${i})..."
                sleep 10
              done
              echo "Topic not found — proceeding anyway (auto-create may apply)"
      containers:
        - name: spark-processor
          image: atlas-processor:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: atlas-spark-config
          command:
            - bash
            - -c
            - |
              set -e
              mkdir -p /app/data/raw /app/data/processed/stream /app/data/processed/batch "${CHECKPOINT_DIR}"

              echo "⏳ Stabilization pause for KRaft leader election..."
              sleep 20

              echo "🚀 Starting Kafka Structured Streaming..."
              spark-submit \
                --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 \
                /app/jobs/kafka_streaming.py &

              echo "🚀 Starting Batch Job..."
              spark-submit /app/jobs/batch_job.py &

              wait
          ports:
            - name: spark-ui
              containerPort: 4040
              protocol: TCP
          volumeMounts:
            - name: spark-checkpoint
              mountPath: /app/checkpoint
            - name: delta-refined
              mountPath: /app/data/processed
            - name: delta-refined-root
              mountPath: /refined
          resources:
            requests:
              cpu: "1500m"
              memory: "3Gi"
            limits:
              cpu: "3000m"
              memory: "6Gi"
          readinessProbe:
            tcpSocket:
              port: spark-ui
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 10
      volumes:
        - name: spark-checkpoint
          persistentVolumeClaim:
            claimName: atlas-spark-checkpoint
        - name: delta-refined
          persistentVolumeClaim:
            claimName: atlas-delta-refined
        - name: delta-refined-root
          persistentVolumeClaim:
            claimName: atlas-delta-refined
