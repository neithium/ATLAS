apiVersion: batch/v1
kind: Job
metadata:
  name: atlas-kafka-init
  namespace: atlas
  labels:
    app.kubernetes.io/component: queue
    app.kubernetes.io/name: atlas-kafka-init
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-kafka-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z atlas-kafka.atlas.svc.cluster.local 9092; do
                echo "waiting for atlas-kafka:9092..."
                sleep 5
              done
      containers:
        - name: topic-init
          image: soldevelo/kafka:4.0
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              set -e
              BOOTSTRAP="atlas-kafka.atlas.svc.cluster.local:9092"
              echo "Creating Kafka topics on ${BOOTSTRAP}..."
              kafka-topics.sh --bootstrap-server "${BOOTSTRAP}" \
                --create --if-not-exists \
                --topic raw-server-metrics \
                --partitions 12 \
                --replication-factor 1
              kafka-topics.sh --bootstrap-server "${BOOTSTRAP}" \
                --create --if-not-exists \
                --topic raw-server-metrics-dlq \
                --partitions 3 \
                --replication-factor 1
              echo "Topics ready:"
              kafka-topics.sh --bootstrap-server "${BOOTSTRAP}" --list
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
