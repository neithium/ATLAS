  # ===========================================================================
  # STREAMING SERVICES (atlas-streaming, atlas-data-producer)
  # ===========================================================================
  # Technology: Spark Structured Streaming + Delta Lake
  # Role: Real-time telemetry deduplication via foreachBatch MERGE
  #
  # Responsibilities:
  #   - Consumes streaming data from Kafka/Socket/Rate source
  #   - Runs foreachBatch MERGE for real-time deduplication
  #   - Writes to same Delta table as batch pipeline
  #   - Maintains exactly-once semantics via checkpointing
  # ===========================================================================

  # Streaming Merge Pipeline
  atlas-streaming:
    build:
      context: ./delta_lake
      dockerfile: Dockerfile
      network: host
    container_name: atlas-streaming
    hostname: streaming
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - C:/Users/Public/atlas-data/raw:/raw
      - C:/Users/Public/atlas-data/refined:/refined
      - ./delta_lake/data:/app/data
      - ./delta_lake/streaming_merge_pipeline.py:/app/streaming_merge_pipeline.py
      - ./delta_lake/delta_merge_pipeline.py:/app/delta_merge_pipeline.py
      - ./schema:/app/schema:ro
    environment:
      - SPARK_MODE=client
      - SPARK_DRIVER_MEMORY=4g
      - SPARK_EXECUTOR_MEMORY=4g
      # Streaming configuration
      - STREAMING_SOURCE=${STREAMING_SOURCE:-rate}      # rate | kafka | socket
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-broker:9092}
      - KAFKA_TOPIC=${KAFKA_TOPIC:-raw-server-metrics}
      - SOCKET_HOST=${SOCKET_HOST:-data-producer}
      - SOCKET_PORT=${SOCKET_PORT:-9999}
      - TRIGGER_INTERVAL=${TRIGGER_INTERVAL:-30 seconds}
      - CHECKPOINT_DIR=${CHECKPOINT_DIR:-/refined/_streaming_checkpoints}
      # Storage optimization
      - COMPRESSION_CODEC=${COMPRESSION_CODEC:-zstd}
      - RUN_VACUUM=${RUN_VACUUM:-n}
      - VACUUM_RETENTION_DAYS=${VACUUM_RETENTION_DAYS:-14}
    working_dir: /app
    networks:
      - atlas-network
    profiles:
      - streaming
    command: >
      bash -c "
        echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━' &&
        echo '  ATLAS Streaming - Real-time Delta Lake MERGE' &&
        echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━' &&
        echo '' &&
        echo 'Configuration:' &&
        echo \"  STREAMING_SOURCE=$$STREAMING_SOURCE\" &&
        echo \"  TRIGGER_INTERVAL=$$TRIGGER_INTERVAL\" &&
        echo \"  COMPRESSION_CODEC=$$COMPRESSION_CODEC\" &&
        echo '' &&
        python3 streaming_merge_pipeline.py \
          --source $$STREAMING_SOURCE \
          --output /refined \
          --trigger \"$$TRIGGER_INTERVAL\" \
          --checkpoint $$CHECKPOINT_DIR
      "

  # Streaming Data Producer (for testing)
  atlas-data-producer:
    build:
      context: ./delta_lake
      dockerfile: Dockerfile
      network: host
    container_name: atlas-data-producer
    hostname: data-producer
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "9999:9999"   # Socket port for streaming
    volumes:
      - C:/Users/Public/atlas-data/raw:/raw
      - ./delta_lake/streaming_data_producer.py:/app/streaming_data_producer.py
      - ./schema:/app/schema:ro
    environment:
      - PRODUCER_MODE=${PRODUCER_MODE:-socket}          # socket | kafka | file
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-broker:9092}
      - KAFKA_TOPIC=${KAFKA_TOPIC:-raw-server-metrics}
      - SOCKET_HOST=0.0.0.0
      - SOCKET_PORT=9999
      - RECORDS_PER_SECOND=${RECORDS_PER_SECOND:-100}
      - DEVICE_COUNT=${DEVICE_COUNT:-100}
    working_dir: /app
    networks:
      - atlas-network
    profiles:
      - producer
    command: >
      bash -c "
        echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━' &&
        echo '  ATLAS Data Producer - Streaming Test Data' &&
        echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━' &&
        echo '' &&
        echo 'Configuration:' &&
        echo \"  PRODUCER_MODE=$$PRODUCER_MODE\" &&
        echo \"  RECORDS_PER_SECOND=$$RECORDS_PER_SECOND\" &&
        echo \"  DEVICE_COUNT=$$DEVICE_COUNT\" &&
        echo '' &&
        python3 streaming_data_producer.py \
          --mode $$PRODUCER_MODE \
          --devices $$DEVICE_COUNT \
          --rate $$RECORDS_PER_SECOND
      "

  atlas-ml:
    build:
      context: ./ML-Model
      dockerfile: Dockerfile
    container_name: atlas-ml
    hostname: ml-model
    volumes:
      - ./ML-Model:/app
      - ./ingestion/device_configs.json:/ingestion/device_configs.json:ro
    working_dir: /app
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - atlas-network

  ml-inference:
    build:
      context: ./ml_inference
      dockerfile: Dockerfile
    container_name: ml-inference
    hostname: ml-inference
    depends_on:
      - atlas-ml
    volumes:
      # Read-only: live telemetry Parquet produced by live_data_gen.py
      - ./ML-Model/telemetry-data/live:/data/live:ro
      # Read-write: enriched predictions consumed by ml_loader.py → ClickHouse
      - ./ml_predictions_output:/data/ml_predictions
      # Read-only: trained model artifacts from train_model.py (Sanjula)
      # isolation_forest.pkl, preprocessor.pkl, health_score_config.pkl
      - ./ML-Model/models:/app/models:ro
    environment:
      - ML_INPUT_DIR=/data/live
      - ML_OUTPUT_DIR=/data/ml_predictions
      - ML_MODEL_PATH=/app/models/isolation_forest.pkl
      - ML_PREPROCESSOR_PATH=/app/models/preprocessor.pkl
      - ML_HEALTH_CONFIG_PATH=/app/models/health_score_config.pkl
      - ML_WATCH_MODE=true
      - ML_POLL_INTERVAL=10
    networks:
      - atlas-network
    restart: unless-stopped


  grafana:
    image: grafana/grafana:latest
    container_name: atlas-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - atlas-network
    volumes:
      - grafana-data:/var/lib/grafana

networks:
  atlas-network:
    driver: bridge
    name: atlas-network
