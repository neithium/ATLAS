# =============================================================================
# ATLAS - Advanced Telemetry Logging & Analytics System
# 5-Container Architecture Docker Compose
# =============================================================================
#
# Architecture:
#   Container 1: atlas-ingestion   - The Generator (FastAPI Telemetry API)
#   Container 2: atlas-broker      - The Broker (Kafka KRaft Mode)
#   Container 3: atlas-processor   - The Processor (Spark Streaming)
#   Container 4: atlas-lakehouse   - The Gatekeeper (Delta Lake MERGE) [ACTIVE]
#   Container 5: atlas-analytics   - The Analytics Hub (ClickHouse + PostgreSQL)
#
# Data Flow:
#   [Generator] → [Broker] → [Processor] → [Lakehouse] → [Analytics]
#       ↓            ↓                                        ↑
#   Raw Volume   Stream Buffer                          Dashboard
#
# Usage:
#   Start all:    docker-compose up -d
#   View logs:    docker-compose logs -f [service_name]
#   Stop all:     docker-compose down
#   Clean all:    docker-compose down -v
#
# =============================================================================

networks:
  atlas-network:
    driver: bridge
    name: atlas-network

volumes:
  kafka-data:
  postgres-data:
  clickhouse-data:
  spark-checkpoint:
  delta-refined:
  raw-telemetry:
  # Shared volumes for Lakehouse module
  raw-volume:
  refined-volume:

services:

  # ===========================================================================
  # CONTAINER 1: THE GENERATOR (atlas-ingestion)
  # ===========================================================================
  # Technology: Python FastAPI / Uvicorn
  # Role: On-Demand Ingestion Microservice
  #
  # Responsibilities:
  #   - Listens for API calls to trigger data generation
  #   - Enforces 10-char minimum for platform_customer_id & application_customer_id
  #   - Buffer Logic: reuses 23 hours of old data, generates only 1 hour fresh
  #   - Pushes payload to Broker and writes to Raw Directory volume
  # ===========================================================================

