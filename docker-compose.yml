# =============================================================================
# ATLAS - Advanced Telemetry Logging & Analytics System
# 5-Container Architecture Docker Compose
# =============================================================================
#
# Architecture:
#   Container 1: atlas-ingestion   - The Generator (FastAPI Telemetry API)
#   Container 2: atlas-broker      - The Broker (Kafka KRaft Mode)
#   Container 3: atlas-processor   - The Processor (Spark Streaming)
#   Container 4: atlas-lakehouse   - The Gatekeeper (Delta Lake MERGE) [ACTIVE]
#   Container 5: atlas-analytics   - The Analytics Hub (ClickHouse + PostgreSQL)
#
# Data Flow:
#   [Generator] → [Broker] → [Processor] → [Lakehouse] → [Analytics]
#       ↓            ↓                                        ↑
#   Raw Volume   Stream Buffer                          Dashboard
#
# Usage:
#   Start all:    docker-compose up -d
#   View logs:    docker-compose logs -f [service_name]
# =============================================================================
# ATLAS - Advanced Telemetry Logging & Analytics System
# 5-Container Architecture Docker Compose
# =============================================================================
#
# Architecture:
#   Container 1: atlas-ingestion   - The Generator (FastAPI Telemetry API)
#   Container 2: atlas-broker      - The Broker (Kafka KRaft Mode)
#   Container 3: atlas-processor   - The Processor (Spark Streaming)
#   Container 4: atlas-lakehouse   - The Gatekeeper (Delta Lake MERGE) [ACTIVE]
#   Container 5: atlas-analytics   - The Analytics Hub (ClickHouse + PostgreSQL)
#
# Data Flow:
#   [Generator] → [Broker] → [Processor] → [Lakehouse] → [Analytics]
#       ↓            ↓                                        ↑
#   Raw Volume   Stream Buffer                          Dashboard
#
# Usage:
#   Start all:    docker-compose up -d
#   View logs:    docker-compose logs -f [service_name]
#   Stop all:     docker-compose down
#   Clean all:    docker-compose down -v
#
# =============================================================================


volumes:
  grafana-data:
  kafka-data:
  postgres-data:
  clickhouse-data:
  spark-checkpoint:
  delta-refined:
  raw-telemetry:
  # Shared volumes for Lakehouse module (NOTE: bind mounts are defined per-service)
  # Streaming checkpoint volume
  streaming-checkpoint:
  # Kafka volumes for 3-node cluster
  kafka-data-1:
  kafka-data-2:
  kafka-data-3:
  # Redis and MinIO data volumes
  redis-data:
  minio-data:
  ingestion-tsdb-data:
  telemetry-cache-data:
  batch-data:

services:
  # ===========================================================================
  # CONTAINER 1: THE V3 INGESTION CLUSTER (atlas-ingestion)
  # ===========================================================================
  # Technology: V3 All-In-One (TimescaleDB + Redis + MinIO + Redpanda + API)
  # Role: Unified Hot/Cold Ingestion Engine
  #
  # Responsibilities:
  #   - Hot Path: Dual-Writing 80,000 devices to TimescaleDB (5-min resolution)
  #   - Cold Path: Daily Mega-Compaction to MinIO Parquet (Daily Archive)
  #   - Streaming: On-Demand Kafka Outgress for Hierarchical Exports
  # ===========================================================================
  # ── OBSERVABILITY: JAEGER (Tracing UI) ──────────────────────────────────
  # jaeger:
  #   image: jaegertracing/all-in-one:1.47
  #   container_name: atlas-tracing
  #   ports:
  #     - "16686:16686"   # Jaeger UI
  #     - "4317:4317"     # OTLP gRPC receiver (Ingestion sends traces here)
  #   networks:
  #     - atlas-network

  atlas-ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile.v2.allinone
    container_name: atlas-ingestion
    hostname: ingestion
    ports:
      - "80:80"        # Production Gateway (Nginx/API)
      - "8001:8001"    # Discovery & Stats Interface
      - "9010:9001"    # MinIO Console
      - "8081:8081"    # TSDB UI (PostWeb)
    environment:
      - TSDB_HOST=127.0.0.1
      - TSDB_NAME=postgres
      - TSDB_USER=postgres
      - TSDB_PASS=postgres
      - REDIS_HOST=127.0.0.1
      - MINIO_HOST=127.0.0.1
      - MINIO_BUCKET=telemetry-raw
      # All 3 brokers listed — producer stays up even if broker1 crashes.
      # Kafka needs only ONE reachable bootstrap to discover the full cluster.
      - KAFKA_BOOTSTRAP=${KAFKA_BOOTSTRAP:-broker1:9092,broker2:9092,broker3:9092}
      - KAFKA_TOPIC=raw-server-metrics
      - MOCK_IPMI=true
      - ENABLE_POLLER=true
      - SCALE_SIZE=80000
    networks:
      - atlas-network
    shm_size: 1gb
    volumes:
      - ./ingestion:/app
      - telemetry-cache-data:/app/telemetry-cache
      - redis-data:/data/redis
      - minio-data:/data/minio
      - ingestion-tsdb-data:/data/timescale
      - batch-data:/app/data
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["/app/v2/entrypoint.sh"]


  # ===========================================================================
  # CONTAINER 2: THE BROKER (atlas-broker)
  # ===========================================================================
  # Technology: Apache Kafka (KRaft Mode - No Zookeeper)
  # Role: Real-Time Streaming Buffer
  #
  #
  # Responsibilities:
  #   - Manages raw-server-metrics topic (12 partitions)
  #   - Manages raw-server-metrics-dlq (Dead Letter Queue, 3 partitions)
  #   - Acts as shock absorber for 4 Lakh+ device burst traffic
  #   - Splits flow to Processor (batch) and Analytics (fast path)
  # ===========================================================================

  # TODO: Nandini - Implement Kafka broker configuration
  # ============================================
  # Kafka Broker 1 (Controller + Broker) - DEFAULT (no profile)
  # ============================================
  # ===========================================================================
  # CONTAINER 2: THE BROKER (atlas-broker)
  # ===========================================================================
  # Technology: Apache Kafka (KRaft Mode - No Zookeeper)
  # Role: Real-Time Streaming Buffer
  #
  # Responsibilities:
  #   - Manages raw-server-metrics topic (12 partitions)
  #   - Manages raw-server-metrics-dlq (Dead Letter Queue, 3 partitions)
  #   - Acts as shock absorber for 4 Lakh+ device burst traffic
  #   - Splits flow to Processor (batch) and Analytics (fast path)
  #
  # Modes:
  #   Single broker (default dev): docker-compose up -d broker1
  #   Full 3-node cluster        : docker-compose --profile full-cluster up -d
  #
  # ⚠️  Always run `docker-compose down -v` before switching modes.
  #     KRaft persists quorum metadata to disk — mismatched volumes will cause
  #     broker1 to reject the new quorum config even with correct env vars.
  # ===========================================================================

  # ============================================
  # Kafka Broker 1 (Controller + Broker) - DEFAULT (no profile)
  # ============================================
  broker1:
    image: soldevelo/kafka:4.0
    container_name: broker1
    hostname: broker1
    ports:
      - "9062:9092"
      - "9063:9093"
      - "9064:9094"
    environment:
      # Node Identity
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker

      # Cluster ID — must be identical across all 3 brokers
      - KAFKA_KRAFT_CLUSTER_ID=atlas-telemetry-cluster-3node

      # Quorum voters — defaults to single node, overridden by cluster.bat
      # single.bat : KAFKA_QUORUM_VOTERS not set → defaults to 1@broker1:9093
      # cluster.bat: KAFKA_QUORUM_VOTERS=1@broker1:9093,2@broker2:9093,3@broker3:9093
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=${KAFKA_QUORUM_VOTERS:-1@broker1:9093}

      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://broker1:9092,EXTERNAL://localhost:9064
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      # Topic Defaults — defaults to single node, overridden by cluster.bat
      # single.bat : RF=1, MIN_ISR=1
      # cluster.bat: RF=3, MIN_ISR=2
      - KAFKA_CFG_NUM_PARTITIONS=12
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=${KAFKA_REPLICATION_FACTOR:-1}
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=${KAFKA_REPLICATION_FACTOR:-1}
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=${KAFKA_REPLICATION_FACTOR:-1}
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=${KAFKA_MIN_ISR:-1}
      - KAFKA_CFG_MIN_INSYNC_REPLICAS=${KAFKA_MIN_ISR:-1}
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=${KAFKA_AUTO_CREATE_TOPICS:-true}

      # Performance
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_CFG_LOG_SEGMENT_BYTES=1073741824
      - KAFKA_CFG_MESSAGE_MAX_BYTES=524288000
      - KAFKA_CFG_SOCKET_REQUEST_MAX_BYTES=524288000
      - KAFKA_CFG_QUEUED_MAX_REQUESTS=10000

      # JVM Memory
      - KAFKA_HEAP_OPTS=-Xmx1024m -Xms1024m
      - KAFKA_JVM_PERFORMANCE_OPTS=-XX:+UseG1GC -XX:MaxGCPauseMillis=20

      # KRaft stability timeouts
      - KAFKA_CFG_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS=10000
      - KAFKA_CFG_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS=10000
      - KAFKA_CFG_CONTROLLER_QUORUM_EJECTION_TIMEOUT_MS=10000

    mem_limit: 8g
    mem_reservation: 2g
    restart: unless-stopped
    volumes:
      - kafka-data-1:/bitnami/kafka
    networks:
      - atlas-network
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ============================================
  # Kafka Broker 2 (Controller + Broker) - WITH PROFILE
  # ============================================
  broker2:
    image: soldevelo/kafka:4.0
    container_name: broker2
    hostname: broker2
    profiles:
      - full-cluster
    ports:
      - "9065:9092"
      - "9066:9093"
      - "9067:9094"
    environment:
      # Node Identity
      - KAFKA_CFG_NODE_ID=2
      - KAFKA_CFG_PROCESS_ROLES=controller,broker

      # Cluster ID — must be identical across all 3 brokers
      - KAFKA_KRAFT_CLUSTER_ID=atlas-telemetry-cluster-3node

      # broker2 only ever runs in full-cluster mode, so always 3-node quorum
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@broker1:9093,2@broker2:9093,3@broker3:9093

      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://broker2:9092,EXTERNAL://localhost:9067
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      # Topic Defaults — always RF=3 in full-cluster mode
      - KAFKA_CFG_NUM_PARTITIONS=12
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_CFG_MIN_INSYNC_REPLICAS=2
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=${KAFKA_AUTO_CREATE_TOPICS:-true}

      # Performance
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_CFG_LOG_SEGMENT_BYTES=1073741824
      - KAFKA_CFG_MESSAGE_MAX_BYTES=524288000
      - KAFKA_CFG_SOCKET_REQUEST_MAX_BYTES=524288000
      - KAFKA_CFG_QUEUED_MAX_REQUESTS=10000

      # JVM Memory
      - KAFKA_HEAP_OPTS=-Xmx1024m -Xms1024m
      - KAFKA_JVM_PERFORMANCE_OPTS=-XX:+UseG1GC -XX:MaxGCPauseMillis=20

      # KRaft stability timeouts
      - KAFKA_CFG_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS=10000
      - KAFKA_CFG_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS=10000
      - KAFKA_CFG_CONTROLLER_QUORUM_EJECTION_TIMEOUT_MS=10000

    mem_limit: 2g
    mem_reservation: 1g
    restart: always
    volumes:
      - kafka-data-2:/bitnami/kafka
    networks:
      - atlas-network
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ============================================
  # Kafka Broker 3 (Controller + Broker) - WITH PROFILE
  # ============================================
  broker3:
    image: soldevelo/kafka:4.0
    container_name: broker3
    hostname: broker3
    profiles:
      - full-cluster
    ports:
      - "9068:9092"
      - "9069:9093"
      - "9070:9094"
    environment:
      # Node Identity
      - KAFKA_CFG_NODE_ID=3
      - KAFKA_CFG_PROCESS_ROLES=controller,broker

      # Cluster ID — must be identical across all 3 brokers
      - KAFKA_KRAFT_CLUSTER_ID=atlas-telemetry-cluster-3node

      # broker3 only ever runs in full-cluster mode, so always 3-node quorum
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@broker1:9093,2@broker2:9093,3@broker3:9093

      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://broker3:9092,EXTERNAL://localhost:9070
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      # Topic Defaults — always RF=3 in full-cluster mode
      - KAFKA_CFG_NUM_PARTITIONS=12
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_CFG_MIN_INSYNC_REPLICAS=2
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=${KAFKA_AUTO_CREATE_TOPICS:-true}

      # Performance
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_CFG_LOG_SEGMENT_BYTES=1073741824
      - KAFKA_CFG_MESSAGE_MAX_BYTES=524288000
      - KAFKA_CFG_SOCKET_REQUEST_MAX_BYTES=524288000
      - KAFKA_CFG_QUEUED_MAX_REQUESTS=10000

      # JVM Memory
      - KAFKA_HEAP_OPTS=-Xmx1024m -Xms1024m
      - KAFKA_JVM_PERFORMANCE_OPTS=-XX:+UseG1GC -XX:MaxGCPauseMillis=20

      # KRaft stability timeouts
      - KAFKA_CFG_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS=10000
      - KAFKA_CFG_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS=10000
      - KAFKA_CFG_CONTROLLER_QUORUM_EJECTION_TIMEOUT_MS=10000

    mem_limit: 2g
    mem_reservation: 1g
    restart: always
    volumes:
      - kafka-data-3:/bitnami/kafka
    networks:
      - atlas-network
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
  # ============================================
  # Kafka Topic Initialization (runs once on startup)
  # ============================================
  kafka-init:
    image: soldevelo/kafka:4.0
    container_name: kafka-init
    hostname: kafka-init
    networks:
      - atlas-network
    depends_on:
      broker1:
        condition: service_healthy
    restart: "no"
    command: >
      bash -c "
        echo 'Creating Kafka topics...' &&
        kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic raw-server-metrics --partitions 12 --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} &&
        kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic raw-server-metrics-dlq --partitions 3 --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} &&
        echo 'Topics created successfully!' &&
        kafka-topics.sh --bootstrap-server broker1:9092 --list
      "

  # ===========================================================================
  # CONTAINER 3: THE PROCESSOR (atlas-processor)
  # ===========================================================================
  # Technology: Apache Spark (PySpark)
  # Role: Heavy Compute Engine
  #
  # Responsibilities:
  #   - Consumes raw JSON from Broker
  #   - Runs .explode() to flatten nested PowerDetail arrays
  #   - Executes 1-hour tumbling window aggregation by device_id
  #   - Maintains checkpointing for fault tolerance
  # ===========================================================================

  # TODO: Sanjula - Implement Spark Structured Streaming job
  
  atlas-processor:
    depends_on:
      broker1:
        condition: service_healthy
    build:
      context: ./processing
      dockerfile: docker/Dockerfile

    container_name: atlas-processor
    hostname: processor

    user: root

    ports:
      - "0:4040"
    # ports:
    #   - "4041:4040"

    environment:
      - SPARK_MODE=driver
      - SPARK_DRIVER_MEMORY=2g
      - SPARK_EXECUTOR_MEMORY=2g

    volumes:
      - ./processing/jobs:/app/jobs
      - ./schema:/app/schema:ro
      - spark-checkpoint:/app/checkpoint
      - ./ingestion/data/raw:/app/data/raw
      - ./ingestion/data/archive:/app/data/archive
      - delta-refined:/app/data/processed
      - batch-data:/app/data 

    networks:
      - atlas-network
      
    
    command: >
          bash -c "
          mkdir -p /app/data/raw &&
          mkdir -p /app/data/processed/stream &&
          mkdir -p /app/data/processed/batch &&
          mkdir -p /app/checkpoint/stream &&
    
          echo '⏳ Waiting for Kafka to stabilize...' &&
          sleep 40 &&
    
          tail -f /dev/null
          "  

  dlq-reviewer:

    build: ./processing/dlq

    container_name: dlq-reviewer

    restart: always
    networks:
      - atlas-network

    depends_on:
      - broker1

  # ===========================================================================
  # CONTAINER 4: THE GATEKEEPER (atlas-lakehouse) [ACTIVE]
  # ===========================================================================
  # Technology: PySpark + Delta Lake (delta-spark)
  # Role: Refined Storage & Deduplication Engine (Source of Truth)
  #
  # Responsibilities:
  #   - Takes Processor's 1-hour aggregated data
  #   - Runs ACID MERGE operation for deduplication
  #   - Uses triple-hash Composite Key: device_id + metric_time + application_customer_id
  #   - Writes clean Parquet to 5-level directory: /refined/metric_name/date/pcid/acid/device_id/
  #   - Runs OPTIMIZE for storage compaction
  #
  # Pipeline Modes:
  #   - benchmark : Static date-partitioned batch MERGE processing
  #   - legacy    : Legacy 2-file MERGE comparison
  #   - livewire  : Spark Structured Streaming (readStream) low-latency continuous ingestion 
  #                 and deduplication directly from upstream Processor outputs.
  # ===========================================================================

  atlas-lakehouse:
    build:
      context: ./delta_lake
      dockerfile: Dockerfile
      network: host
    container_name: atlas-lakehouse
    hostname: lakehouse
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Shared volumes for inter-container data flow
      - delta-refined:/refined
      - delta-refined:/stream_raw  # Mounted to read output from processor container in livewire mode
      # Mount local data folder to see Delta Lake logs on host
      # Schema reference
      - ./delta_lake/generate_data.py:/app/generate_data.py
      - ./delta_lake/delta_core.py:/app/delta_core.py
      - ./delta_lake/run_benchmark.py:/app/run_benchmark.py
      - ./delta_lake/run_livewire.py:/app/run_livewire.py
      # Schema reference
      - ./schema:/app/schema:ro
    environment:
      - PYTHONUNBUFFERED=1
      - SPARK_MODE=client
      - SPARK_DRIVER_MEMORY=2g
      - SPARK_EXECUTOR_MEMORY=4g
        # Control flags (set via: docker compose run -e RUN_GENERATOR=y atlas-lakehouse)
      - RUN_GENERATOR=${RUN_GENERATOR:-n}            # y = run generator, n = skip
      - GENERATOR_MODE=${GENERATOR_MODE:-livewire}  # benchmark | legacy | livewire
      - DEVICE_COUNT=${DEVICE_COUNT:-100}            # Number of devices for benchmark
      - BATCH_SIZE=${BATCH_SIZE:-1000}               # Batch size for memory management
      - NUM_DAYS=${NUM_DAYS:-7}                      # Number of daily files (7-day rolling window)
      - START_DATE=${START_DATE:-2026-03-01}         # First file date (YYYY-MM-DD)
      - RUN_PIPELINE=${RUN_PIPELINE:-y}              # y = run pipeline, n = skip
      - PIPELINE_MODE=${PIPELINE_MODE}    # benchmark | legacy | livewire
      - OPTIMIZE_EVERY=${OPTIMIZE_EVERY:-5}          # Run OPTIMIZE after every N batches
      - KEEP_ALIVE=${KEEP_ALIVE:-y}                  # y = keep container running after pipeline
      # Storage optimization settings
      - COMPRESSION_CODEC=${COMPRESSION_CODEC:-zstd}      # zstd | snappy | gzip
      - RUN_VACUUM=${RUN_VACUUM:-n}                        # y = run vacuum after pipeline
      - VACUUM_RETENTION_DAYS=${VACUUM_RETENTION_DAYS:-14} # Days to retain Delta log files
      # Horizontal scaling (dynamic allocation)
      - SPARK_DYNAMIC_ALLOCATION=${SPARK_DYNAMIC_ALLOCATION:-false}  # Enable dynamic allocation (true/false)
      - SPARK_EXECUTOR_INSTANCES=${SPARK_EXECUTOR_INSTANCES:-1}
      - SPARK_EXECUTOR_CORES=${SPARK_EXECUTOR_CORES:-6}
      - SPARK_MIN_EXECUTORS=${SPARK_MIN_EXECUTORS:-2}
      - SPARK_MAX_EXECUTORS=${SPARK_MAX_EXECUTORS:-8}
    
    working_dir: /app
    networks:
      - atlas-network
    command: >
      bash -c "
        echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━' &&
        echo '  ATLAS Lakehouse - Delta Lake Deduplication Engine' &&
        echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━' &&
        echo '' &&
        echo 'Configuration:' &&
        [ -z \"$$PIPELINE_MODE\" ] && PIPELINE_MODE=\"$$GENERATOR_MODE\";
        echo \"  RUN_GENERATOR=$$RUN_GENERATOR\" &&
        echo \"  GENERATOR_MODE=$$GENERATOR_MODE\" &&
        echo \"  DEVICE_COUNT=$$DEVICE_COUNT\" &&
        echo \"  BATCH_SIZE=$$BATCH_SIZE\" &&
        echo \"  NUM_DAYS=$$NUM_DAYS\" &&
        echo \"  START_DATE=$$START_DATE\" &&
        echo \"  RUN_PIPELINE=$$RUN_PIPELINE\" &&
        echo \"  PIPELINE_MODE=$$PIPELINE_MODE\" &&
        echo \"  OPTIMIZE_EVERY=$$OPTIMIZE_EVERY\" &&
        echo \"  COMPRESSION_CODEC=$$COMPRESSION_CODEC\" &&
        echo \"  RUN_VACUUM=$$RUN_VACUUM\" &&
        echo \"  VACUUM_RETENTION_DAYS=$$VACUUM_RETENTION_DAYS\" &&
        echo \"  KEEP_ALIVE=$$KEEP_ALIVE\" &&
        echo '' &&
        if [ \"$$RUN_GENERATOR\" = 'y' ] || [ \"$$RUN_GENERATOR\" = 'Y' ]; then
          if [ \"$$GENERATOR_MODE\" = 'legacy' ]; then
            echo '[1/3] Generating legacy merge-demo input under /raw ...' &&
            python3 generate_data.py --mode legacy --output /raw;
          elif [ \"$$GENERATOR_MODE\" = 'livewire' ]; then
            echo '[1/3] Skipping generator for livewire mode...' && true;
          else
            echo '[1/3] Generating benchmark data (7-day rolling windows) under /raw/benchmark_data ...' &&
            python3 generate_data.py --mode benchmark --output /raw --devices $$DEVICE_COUNT --batch-size $$BATCH_SIZE --num-days $$NUM_DAYS --start-date $$START_DATE;
          fi;
        else
          echo \"[1/3] Skipping generator (RUN_GENERATOR=$$RUN_GENERATOR)\";
        fi &&
        echo '' &&
        if [ \"$$RUN_PIPELINE\" = 'y' ] || [ \"$$RUN_PIPELINE\" = 'Y' ]; then
          echo \"[2/3] Running deduplication pipeline (mode=$$PIPELINE_MODE)...\" &&
          if [ \"$$PIPELINE_MODE\" = 'livewire' ]; then
            python3 run_livewire.py;
          else
            python3 run_benchmark.py;
          fi;
        else
          echo \"[2/3] Skipping pipeline (RUN_PIPELINE=$$RUN_PIPELINE)\";
        fi &&
        echo '' &&
        if [ \"$$RUN_VACUUM\" = 'y' ] || [ \"$$RUN_VACUUM\" = 'Y' ]; then
          echo '[3/3] Running VACUUM to clean old Delta log files...' &&
          python3 -c \"from run_benchmark import create_spark_session; from delta_core import vacuum_old_files; spark = create_spark_session('Vacuum'); vacuum_old_files(spark, '/refined', $$VACUUM_RETENTION_DAYS * 24)\" ;
        else
          echo \"[3/3] Skipping vacuum (RUN_VACUUM=$$RUN_VACUUM)\";
        fi &&
        echo '' &&
        echo 'Done!' &&
        if [ \"$$KEEP_ALIVE\" = 'y' ] || [ \"$$KEEP_ALIVE\" = 'Y' ]; then
          echo 'KEEP_ALIVE enabled: container will stay running.' &&
          tail -f /dev/null;
        fi
      "

  # ===========================================================================
  # CONTAINER 5: THE ANALYTICS HUB (atlas-analytics)
  # ===========================================================================
  # CONTAINER 5: THE ANALYTICS HUB (atlas-analytics)
  # ===========================================================================
  # Technology: ClickHouse + PostgreSQL + Python Loader (unified container)
  # Role: Dashboard Engine + Metadata Store + Batch Ingestion
  #
  # Managed by supervisord inside a single container:
  #   - ClickHouse: Fast analytical queries on deduplicated telemetry data
  #   - PostgreSQL: Metadata store (watermarks, device/location registry)
  #   - Delta Loader: Partition-aware batch ingestion from Refined Layer
  #     (persistent scheduler — polls every SCHEDULE_INTERVAL_SECONDS)
  #
  # The Loader reads from refined-volume using the 5-level partition scheme:
  #   report_type / partition_date / platform_customer_id /
  #   application_customer_id / device_id
  # and prunes by partition_date for incremental loads.
  #
  # Credentials: All DB credentials are sourced from .env.example via env_file.
  # To change creds, edit .env.example — they flow into entrypoint.sh,
  # loader-start.sh, and delta_loader.py automatically.
  #
  # SCHEDULE_INTERVAL_SECONDS (default 3600 in .env.example):
  #   The Delta Loader polls the refined layer every 3600 s (1 hour).
  #   3600 s matches the upstream 1-hour tumbling-window batch cadence
  #   so each loader run picks up exactly the latest hourly batch.
  #   Set to 0 for a single one-shot run.
  # ===========================================================================

  atlas-analytics:
    build:
      context: ./storage
      dockerfile: Dockerfile
    container_name: atlas-analytics
    hostname: analytics
    ports:
      - "127.0.0.1:8124:8123" # ClickHouse HTTP (localhost only)
      - "127.0.0.1:9002:9000" # ClickHouse Native TCP (localhost only)
      - "127.0.0.1:5433:5432"
      - "127.0.0.1:8501:8501" # Streamlit Dashboard # PostgreSQL (localhost only, mapped to 5433 to avoid host conflict)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env.example
    environment:
      # Override hosts for internal (same-container) connections.
      # .env.example sets CLICKHOUSE_HOST=analytics / POSTGRES_HOST=analytics
      # which is the hostname for OTHER containers; inside this container we
      # must use 127.0.0.1 since all three services share one network namespace.
      - CLICKHOUSE_HOST=127.0.0.1
      - POSTGRES_HOST=127.0.0.1
      # ML Loader configuration
      - ML_PREDICTIONS_PATH=/data/ml_predictions
      - ML_SCHEDULE_INTERVAL_SECONDS=300
      - ML_BATCH_SIZE=10000
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - postgres-data:/var/lib/postgresql/data
      # READ from the same refined-volume that Lakehouse writes to.
      # Uses the 5-level Hive partition layout written by delta_merge_pipeline.
      - C:/Users/Public/atlas-data/refined:/data/refined:ro
      # Mount Delta Lake volume for streaming metrics (READ-WRITE for DeltaTable metadata)
      - delta-refined:/refined
      # Init scripts (run on first start by loader-start.sh)
      - ./storage/clickhouse/init.sql:/app/init-scripts/clickhouse-init.sql:ro
      - ./storage/postgres/init.sql:/app/init-scripts/postgres-init.sql:ro
      # Application code
      - ./storage/clickhouse/delta_loader.py:/app/delta_loader.py:ro
      - ./storage/clickhouse/ml_loader.py:/app/ml_loader.py:ro
      - ./storage/clickhouse/validation_queries.sql:/app/validation_queries.sql:ro
      - ./storage/app.py:/app/app.py:ro
      - ./storage/ml_app.py:/app/ml_app.py:ro
      # ML predictions from inference layer (read-only)
      - ./ml_predictions_output:/data/ml_predictions:ro
      # Schema reference
      - ./schema:/app/schema:ro
      # Mount the prompts directory into the app workspace
      - ./storage/prompts:/app/prompts:ro
    networks:
      - atlas-network
    healthcheck:
      # Use default user (no auth) for ClickHouse probe — matches loader-start.sh
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --host 127.0.0.1 --query 'SELECT 1' && pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-atlas}",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===========================================================================
  # DEVELOPMENT & MONITORING TOOLS (Optional)
  # ===========================================================================

