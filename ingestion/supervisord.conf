[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:redis]
command=/usr/local/bin/redis-server /etc/redis/redis.conf --dir /data/redis --appendonly yes
directory=/
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/redis.log
stderr_logfile=/var/log/redis_err.log
environment=REDIS_PORT="6379"

[program:minio]
command=/usr/local/bin/minio server /data --console-address :"9001"
directory=/
autostart=true
autorestart=true
startsecs=10
priority=10  ; start after redis
stdout
