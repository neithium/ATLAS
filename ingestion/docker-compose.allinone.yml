version: '3.8'
services:
  allinone:
    build:
      context: .
      dockerfile: Dockerfile.allinone.final
    ports:
      - "80:80"
      - "443:443"
      - "9000:9000"
      - "9001:9001"
      - "6379:6379"
      - "8000:8000"
    volumes:
      - redis_data:/data/redis
      - minio_data:/data
      - ./nginx-allinone.conf:/etc/nginx/nginx.conf:ro
    environment:
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - MINIO_HOST=localhost
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MOCK_IPMI=true
      - ENABLE_POLLER=true
volumes:
  redis_data:
  minio_data:

