# nginx.conf - Load Balancer for Power Monitor API
# This shows how to distribute traffic across multiple API instances

# Upstream definition - the backend API servers
upstream power_api {
    # Least connections: sends to server with fewest active connections
    least_conn;
    
    # API Server 1 (on port 8001)
    server 10.0.0.11:8001 weight=5;
    
    # API Server 2 (on port 8002)
    server 10.0.0.12:8002 weight=5;
    
    # API Server 3 (on port 8003)
    server 10.0.0.13:8003 weight=5;
    
    # Health check - mark server down if 3 checks fail
    server 10.0.0.11:8001 down;
    
    # Keep connections alive to upstream
    keepalive 32;
}

# Main server block
server {
    listen 80;
    server_name api.powermonitor.local;

    # Health check endpoint (doesn't need load balancing)
    location /health {
        proxy_pass http://power_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Health check settings
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Main API routes
    location / {
        # Forward requests to upstream API servers
        proxy_pass http://power_api;
        
        # HTTP/1.1 for keepalive connections
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Forward client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # WebSocket support (if needed for real-time)
    location /ws/ {
        proxy_pass http://power_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Static files (if any)
    location /static/ {
        alias /var/www/static/;
        expires 1d;
    }

    # Rate limiting - protect API from abuse
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    
    location / {
        limit_req zone=api_limit burst=200 nodelay;
    }
}

# HTTPS server (SSL/TLS)
server {
    listen 443 ssl http2;
    server_name api.powermonitor.local;

    # SSL certificates
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Same proxy configuration as HTTP
    location / {
        proxy_pass http://power_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

