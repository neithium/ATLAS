version: "3.8"

# ATLAS Remote Worker - For Windows/Laptop2
# PREREQUISITES:
# 1. Find Laptop1 IP: On Laptop1 run: ipconfig | findstr "IPv4"
# 2. Mount network drive: net use Z: \\<Laptop1-IP>\Public\atlas-data
#    (You'll be prompted for Laptop1 Windows credentials)
# 3. Verify mount: dir Z:\ (should show: raw  refined)
# 4. Update SPARK_MASTER_URL below with Laptop1's IP
# 5. Run: docker-compose up -d
# 6. Install dependencies: docker exec atlas-spark-worker pip install delta-spark==3.1.0 pyarrow>=14.0.0

services:
  atlas-spark-worker:
    # Using bitnamilegacy/spark:3.5 - same as master node
    image: bitnamilegacy/spark:3.5
    container_name: atlas-spark-worker
    network_mode: host
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_DAEMON_USER=root
      # CRITICAL: Update this to Laptop1's IP address (find via: ipconfig)
      # Example: SPARK_MASTER_URL=spark://192.168.1.15:7077
      - SPARK_MASTER_URL=spark://<LAPTOP1_IP>:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      # Disable RPC auth/encryption for local network deployments
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      # Delta Lake & Parquet optimizations
      - COMPRESSION_CODEC=zstd
      - PYSPARK_PYTHON=python3
    volumes:
      # CRITICAL: These MUST point to the mounted network drive from Laptop1
      # On Laptop2 (Windows), mount Laptop1's C:\Users\Public\atlas-data as Z: drive
      # Command: net use Z: \\<Laptop1-IP>\Public\atlas-data
      # Then use Z:/ paths below (forward slashes for Docker)
      - Z:/atlas-data/raw:/raw
      - Z:/atlas-data/refined:/refined
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
