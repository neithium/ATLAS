version: "3.8"

services:
  atlas-spark-worker:
    image: bitnamilegacy/spark:3.5
    container_name: atlas-spark-worker
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_DAEMON_USER=root
      # In a multi-node setup, you MUST set SPARK_MASTER_URL to the actual IP/hostname of the master node.
      # e.g., SPARK_MASTER_URL=spark://192.168.1.100:7077
      - SPARK_MASTER_URL=spark://atlas-spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
    volumes:
      # In a distributed cluster, these directories must either exist on the worker host,
      # or you must mount a shared network file system (like NFS, CIFS, Azure Files, EFS) 
      # so that all nodes read/write to the same physical underlying storage.
      - ../:/app
      - /mnt/nfs/shared/refined:/refined
      - /mnt/nfs/shared/raw:/raw
    # In distributed deployments, standard docker compose networks might not span hosts
    # unless you are using Docker Swarm or external overlay networks.
    # Therefore, you might use 'network_mode: host' or direct IP configurations.
