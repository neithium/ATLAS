# ATLAS Delta Lake Module - Docker Compose
# Spark container for Delta Lake deduplication testing
# Supports both batch and streaming modes with horizontal scaling

services:
  # =============================================================================
  # BATCH PROCESSING SERVICE
  # =============================================================================
  spark:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: atlas-delta-lake
    dns:
      - 8.8.8.8 
      - 8.8.4.4
    volumes:
      # Shared volume for /raw (processing <-> delta_lake)
      - raw_volume:/raw
      # Shared volume for /refined (delta_lake <-> analytics)
      - refined_volume:/refined
      # Mount scripts for live editing (optional)
      - ./generate_data.py:/app/generate_data.py
      - ./delta_merge_pipeline.py:/app/delta_merge_pipeline.py
      - ./streaming_merge_pipeline.py:/app/streaming_merge_pipeline.py
      - ./streaming_data_producer.py:/app/streaming_data_producer.py
    environment:
      - SPARK_MODE=client
      - SPARK_DRIVER_MEMORY=2g
      - SPARK_EXECUTOR_MEMORY=2g
      # Control flags (set via: docker compose run -e RUN_GENERATOR=y spark)
      - RUN_GENERATOR=${RUN_GENERATOR:-n}      # y = run generator, n = skip
      - GENERATOR_MODE=${GENERATOR_MODE:-benchmark}  # benchmark | legacy | dataframe
      - DEVICE_COUNT=${DEVICE_COUNT:-100000}   # Number of devices for benchmark
      - BATCH_SIZE=${BATCH_SIZE:-10000}        # Batch size for memory management
      - NUM_DAYS=${NUM_DAYS:-7}                # Number of daily files (7-day rolling window)
      - START_DATE=${START_DATE:-2026-03-01}   # First file date (YYYY-MM-DD)
      - RUN_PIPELINE=${RUN_PIPELINE:-n}        # y = run pipeline, n = skip
      - PIPELINE_MODE=${PIPELINE_MODE:-benchmark}  # benchmark | legacy | dataframe
      - OPTIMIZE_EVERY=${OPTIMIZE_EVERY:-3}    # Run OPTIMIZE after every N batches
      # Compression codec (zstd provides ~30% better compression than snappy)
      - COMPRESSION_CODEC=${COMPRESSION_CODEC:-zstd}
      # Vacuum settings (14-day retention)
      - RUN_VACUUM=${RUN_VACUUM:-n}            # y = run vacuum after pipeline
      - VACUUM_RETENTION_DAYS=${VACUUM_RETENTION_DAYS:-14}
      # Horizontal scaling
      - SPARK_DYNAMIC_ALLOCATION=${SPARK_DYNAMIC_ALLOCATION:-false}
      - SPARK_EXECUTOR_INSTANCES=${SPARK_EXECUTOR_INSTANCES:-2}
      - SPARK_EXECUTOR_CORES=${SPARK_EXECUTOR_CORES:-2}
      - SPARK_MIN_EXECUTORS=${SPARK_MIN_EXECUTORS:-1}
      - SPARK_MAX_EXECUTORS=${SPARK_MAX_EXECUTORS:-8}
    working_dir: /app
    # Command checks environment variables (no interactive prompts)
    command: >
      bash -c "
        echo '============================================' &&
        echo '  ATLAS - Delta Lake Deduplication Module' &&
        echo '============================================' &&
        echo '' &&
        echo 'Configuration:' &&
        echo \"  RUN_GENERATOR=$$RUN_GENERATOR\" &&
        echo \"  GENERATOR_MODE=$$GENERATOR_MODE\" &&
        echo \"  DEVICE_COUNT=$$DEVICE_COUNT\" &&
        echo \"  BATCH_SIZE=$$BATCH_SIZE\" &&
        echo \"  NUM_DAYS=$$NUM_DAYS\" &&
        echo \"  START_DATE=$$START_DATE\" &&
        echo \"  RUN_PIPELINE=$$RUN_PIPELINE\" &&
        echo \"  PIPELINE_MODE=$$PIPELINE_MODE\" &&
        echo \"  OPTIMIZE_EVERY=$$OPTIMIZE_EVERY\" &&
        echo \"  COMPRESSION_CODEC=$$COMPRESSION_CODEC\" &&
        echo \"  RUN_VACUUM=$$RUN_VACUUM\" &&
        echo '' &&
        if [ \"$$RUN_GENERATOR\" = 'y' ] || [ \"$$RUN_GENERATOR\" = 'Y' ]; then
          if [ \"$$GENERATOR_MODE\" = 'legacy' ]; then
            echo '[1/2] Generating legacy merge-demo input under /raw ...' &&
            python3 generate_data.py --mode legacy --output /raw --compression $$COMPRESSION_CODEC;
          else
            echo '[1/2] Generating benchmark data (7-day rolling windows) under /raw/benchmark_data ...' &&
            python3 generate_data.py --mode benchmark --output /raw --devices $$DEVICE_COUNT --batch-size $$BATCH_SIZE --num-days $$NUM_DAYS --start-date $$START_DATE --compression $$COMPRESSION_CODEC;
          fi;
        else
          echo \"[1/2] Skipping generator (RUN_GENERATOR=$$RUN_GENERATOR)\";
        fi &&
        echo '' &&
        if [ \"$$RUN_PIPELINE\" = 'y' ] || [ \"$$RUN_PIPELINE\" = 'Y' ]; then
          VACUUM_FLAG=\"\";
          if [ \"$$RUN_VACUUM\" = 'y' ] || [ \"$$RUN_VACUUM\" = 'Y' ]; then
            VACUUM_FLAG=\"--vacuum --vacuum-retention-days $$VACUUM_RETENTION_DAYS\";
          fi;
          DYNAMIC_FLAG=\"\";
          if [ \"$$SPARK_DYNAMIC_ALLOCATION\" = 'true' ]; then
            DYNAMIC_FLAG=\"--dynamic-allocation\";
          fi;
          echo \"[2/2] Running deduplication pipeline (mode=$$PIPELINE_MODE)...\" &&
          python3 delta_merge_pipeline.py --input /raw --output /refined --mode $$PIPELINE_MODE --optimize-every $$OPTIMIZE_EVERY --executors $$SPARK_EXECUTOR_INSTANCES --executor-cores $$SPARK_EXECUTOR_CORES $$VACUUM_FLAG $$DYNAMIC_FLAG;
        else
          echo \"[2/2] Skipping pipeline (RUN_PIPELINE=$$RUN_PIPELINE)\";
        fi &&
        echo '' &&
        echo 'Done!'
      "

  # =============================================================================
  # STREAMING PROCESSING SERVICE
  # =============================================================================
  spark-streaming:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: atlas-delta-streaming
    dns:
      - 8.8.8.8 
      - 8.8.4.4
    volumes:
      - raw_volume:/raw
      - refined_volume:/refined
      - ./streaming_merge_pipeline.py:/app/streaming_merge_pipeline.py
      - ./streaming_data_producer.py:/app/streaming_data_producer.py
    environment:
      - SPARK_DRIVER_MEMORY=2g
      - SPARK_EXECUTOR_MEMORY=2g
      # Streaming source configuration
      - STREAMING_SOURCE=${STREAMING_SOURCE:-rate}  # kafka | rate | socket
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_TOPIC=${KAFKA_TOPIC:-atlas.telemetry.flattened}
      # Streaming settings
      - TRIGGER_INTERVAL=${TRIGGER_INTERVAL:-30 seconds}
      - MAX_OFFSETS_PER_TRIGGER=${MAX_OFFSETS_PER_TRIGGER:-100000}
      - REFINED_PATH=/refined
      - STREAMING_CHECKPOINT_PATH=/refined/_streaming_checkpoints
      # Horizontal scaling for streaming
      - SPARK_DYNAMIC_ALLOCATION=${SPARK_DYNAMIC_ALLOCATION:-true}
      - SPARK_EXECUTOR_INSTANCES=${SPARK_EXECUTOR_INSTANCES:-2}
      - SPARK_EXECUTOR_CORES=${SPARK_EXECUTOR_CORES:-2}
      - SPARK_MIN_EXECUTORS=${SPARK_MIN_EXECUTORS:-1}
      - SPARK_MAX_EXECUTORS=${SPARK_MAX_EXECUTORS:-8}
      # Maintenance settings
      - OPTIMIZE_ENABLED=${OPTIMIZE_ENABLED:-true}
      - OPTIMIZE_INTERVAL_MINUTES=${OPTIMIZE_INTERVAL_MINUTES:-60}
    working_dir: /app
    command: >
      bash -c "
        echo '============================================' &&
        echo '  ATLAS - Streaming Merge Pipeline' &&
        echo '============================================' &&
        echo '' &&
        echo 'Configuration:' &&
        echo \"  STREAMING_SOURCE=$$STREAMING_SOURCE\" &&
        echo \"  TRIGGER_INTERVAL=$$TRIGGER_INTERVAL\" &&
        echo \"  REFINED_PATH=$$REFINED_PATH\" &&
        echo '' &&
        python3 streaming_merge_pipeline.py --source $$STREAMING_SOURCE --output $$REFINED_PATH --trigger \"$$TRIGGER_INTERVAL\"
      "
    profiles:
      - streaming  # Only start with: docker compose --profile streaming up

  # =============================================================================
  # STREAMING DATA PRODUCER SERVICE
  # =============================================================================
  data-producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-data-producer
    volumes:
      - raw_volume:/raw
      - ./streaming_data_producer.py:/app/streaming_data_producer.py
    environment:
      - PRODUCER_MODE=${PRODUCER_MODE:-socket}  # kafka | socket | file
      - SOCKET_HOST=0.0.0.0
      - SOCKET_PORT=9999
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_TOPIC=${KAFKA_TOPIC:-atlas.telemetry.flattened}
      - TOTAL_DEVICES=${TOTAL_DEVICES:-1000}
      - RECORDS_PER_SECOND=${RECORDS_PER_SECOND:-1000}
    ports:
      - "9999:9999"
    working_dir: /app
    command: >
      bash -c "
        echo '============================================' &&
        echo '  ATLAS - Streaming Data Producer' &&
        echo '============================================' &&
        python3 streaming_data_producer.py --mode $$PRODUCER_MODE --devices $$TOTAL_DEVICES --rate $$RECORDS_PER_SECOND
      "
    profiles:
      - producer  # Only start with: docker compose --profile producer up

  # =============================================================================
  # JUPYTER NOTEBOOK SERVICE
  # =============================================================================
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-delta-jupyter
    ports:
      - "8888:8888"
    volumes:
      - raw_volume:/raw
      - refined_volume:/refined
      - ./:/app/notebooks
    environment:
      - SPARK_DRIVER_MEMORY=2g
    working_dir: /app
    command: >
      bash -c "
        pip install jupyter &&
        jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
      "
    profiles:
      - jupyter  # Only start with: docker compose --profile jupyter up

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  raw_volume:
    driver: local
  refined_volume:
    driver: local